<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TOTP Generator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 500px;
      margin: 40px auto;
      padding: 20px;
    }
    input, button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      font-size: 16px;
    }
    #code {
      margin-top: 20px;
      font-size: 32px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h2>TOTP Generator</h2>
  <input id="secret" placeholder="Enter Base32 secret" />
  <button onclick="generateCode()">Generate 6-digit code</button>
  <div id="code">------</div>

  <script>
    function base32ToBytes(base32) {
      const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ234567";
      let bits = "";
      let bytes = [];

      base32 = base32.replace(/=+$/, "").toUpperCase().replace(/\s/g, "");

      for (let char of base32) {
        const val = alphabet.indexOf(char);
        if (val === -1) throw new Error("Invalid Base32 character");
        bits += val.toString(2).padStart(5, "0");
      }

      for (let i = 0; i + 8 <= bits.length; i += 8) {
        bytes.push(parseInt(bits.slice(i, i + 8), 2));
      }

      return new Uint8Array(bytes);
    }

    async function generateTOTP(secret, digits = 6, period = 30) {
      const keyBytes = base32ToBytes(secret);
      const counter = Math.floor(Date.now() / 1000 / period);

      const buffer = new ArrayBuffer(8);
      const view = new DataView(buffer);
      view.setUint32(4, counter);

      const cryptoKey = await crypto.subtle.importKey(
        "raw",
        keyBytes,
        { name: "HMAC", hash: "SHA-1" },
        false,
        ["sign"]
      );

      const hmac = await crypto.subtle.sign("HMAC", cryptoKey, buffer);
      const hmacBytes = new Uint8Array(hmac);

      const offset = hmacBytes[hmacBytes.length - 1] & 0x0f;
      const code =
        ((hmacBytes[offset] & 0x7f) << 24) |
        ((hmacBytes[offset + 1] & 0xff) << 16) |
        ((hmacBytes[offset + 2] & 0xff) << 8) |
        (hmacBytes[offset + 3] & 0xff);

      return (code % 10 ** digits).toString().padStart(digits, "0");
    }

    async function generateCode() {
      const secret = document.getElementById("secret").value.trim();
      const output = document.getElementById("code");

      try {
        const code = await generateTOTP(secret);
        output.textContent = code;
      } catch (e) {
        output.textContent = "Error: " + e.message;
      }
    }
  </script>
</body>
</html>
